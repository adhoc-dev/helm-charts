{{ $minorVersion := include "adhoc-odoo.odoo-minor-version" . | int }}
{{- $odooVersion := include "adhoc-odoo.odoo-version" . | replace "." "" | int -}}
{{- $odooImage := include "odoo.image" . -}}
{{ $replicaCount := (default 1 .Values.replicaCount) | int }}
{{- $isKedaEnabled := eq (include "keda.enabled" . | trim) "true" -}}
{{- $isWakeupEnabled := eq (include "wakeupController.enabled" . | trim) "true" -}}
{{- $fullName := include "adhoc-odoo.serviceNameSuffix" . -}}
{{- $svcHost := ternary (printf "%s-nginx" $fullName) (printf "%s-http" $fullName) .Values.ingress.reverseProxy.enabled -}}
{{- $fusePath := printf "/home/odoo/data/filestore/%s" (ternary "odoo" .Release.Name .Values.cloudNativePG.enabled) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adhoc-odoo.fullname" . }}
  labels:
    {{- include "adhoc-odoo.labels" . | nindent 4 }}
    {{- if $isWakeupEnabled }}
    {{ printf "%s/managed" (include "wakeupController.domain" .) | quote }}: "true"
    {{- end }}
  annotations:
    certmanager.k8s.io/disable-auto-restart: "true"
    "kubernetes.io/change-cause": {{ .Values.changeCause | quote }}
    "adhoc.ar/dev-name": "" # Used to identify the developer that deployed the app
    "adhoc.ar/dev-r2cmd": "" # Used to store the r2cmd command to redeploy the app
spec:
  {{- if not (or .Values.autoscaling.hpa.enabled $isKedaEnabled) }}
  replicas: {{ .Values.replicaCount | int }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "adhoc-odoo.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      {{- if or .Values.autoscaling.hpa.enabled $isKedaEnabled }}
      maxSurge: 25%
      maxUnavailable: 25%
      {{- else }}
      # We allow up to 2 extra pods on rolling updates (if there are enough replicas)
      maxSurge: {{ ternary 2 1 (gt $replicaCount 2) }}
      # We don't allow disruptions on rolling updates (if there is only one pod, we can't afford to have it down)
      maxUnavailable: {{ max (min (sub $replicaCount 1) 2) 0 }}
      {{- end }}
  revisionHistoryLimit: 10
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if eq .Values.storage.location "fuse" }}
        gke-gcsfuse/volumes: "true"
        # https://cloud.google.com/kubernetes-engine/docs/how-to/persistent-volumes/cloud-storage-fuse-csi-driver?hl=es-419
        # De forma predeterminada, el contenedor del sidecar está configurado con las siguientes solicitudes de recursos, sin establecer los límites de recursos:
        # CPU de 250 m
        # 256 MiB de memoria
        # Almacenamiento efímero de 5 GiB
        gke-gcsfuse/cpu-limit: "100m"
        gke-gcsfuse/memory-limit: 2Gi
        gke-gcsfuse/ephemeral-storage-limit: 5Gi
        {{- if eq .Values.adhoc.appType "prod" }}
        gke-gcsfuse/cpu-request: 10m
        gke-gcsfuse/memory-request: 100Mi
        gke-gcsfuse/ephemeral-storage-request: 248Mi
        {{- else }}
        gke-gcsfuse/cpu-request: 5m
        gke-gcsfuse/memory-request: 25Mi
        gke-gcsfuse/ephemeral-storage-request: 100Mi
        {{- end }}
        {{- end }}
        {{- $egressMode := include "adhoc-odoo.egressMode" . }}
        {{- if and .Values.ingress.istio.enabled (or (eq $egressMode "observe") (eq $egressMode "enforce")) }}
        {{- /* 443 NUNCA puede excluirse (en ningún modo): el HTTPS debe pasar por el sidecar para la
           whitelist + logging SNI. Se valida el valor EFECTIVO (override de podAnnotations o el value). */}}
        {{- $effExcl := (index (.Values.podAnnotations | default dict) "traffic.sidecar.istio.io/excludeOutboundPorts") | default (include "adhoc-odoo.egressExcludePorts" .) }}
        {{- range (splitList "," $effExcl) }}{{- if eq (trim .) "443" }}{{- fail "ingress.istio.egress.excludeOutboundPorts no puede incluir 443: el HTTPS debe pasar por el sidecar (whitelist + logging SNI). Quitá 443." }}{{- end }}{{- end }}
        {{- /* No pisar la annotation si el usuario ya la definió en podAnnotations (key duplicada). */}}
        {{- if not (hasKey (.Values.podAnnotations | default dict) "traffic.sidecar.istio.io/excludeOutboundPorts") }}
        # SMTP (587/465/25/2525…) y SSH (22) son server-speaks-first: cuelgan el tls_inspector del
        # egress (logging SNI). Se sacan del sidecar y se gobiernan por NetworkPolicy. El puerto SMTP
        # configurado (odoo.smtp.port) se auto-incluye. Ver doc/adhoc-odoo.md.
        traffic.sidecar.istio.io/excludeOutboundPorts: {{ include "adhoc-odoo.egressExcludePorts" . | quote }}
        {{- end }}
        {{- /* Metadata server de GKE (169.254.169.254): la Workload Identity de gcsfuse lo consulta
           por HTTP:80; bajo enforce el sidecar lo bloquea (502) → gcsfuse no monta → el pod no arranca.
           Se saca del redirect del sidecar (queda gobernado por la NetworkPolicy). Ver doc/adhoc-odoo.md. */}}
        {{- if not (hasKey (.Values.podAnnotations | default dict) "traffic.sidecar.istio.io/excludeOutboundIPRanges") }}
        traffic.sidecar.istio.io/excludeOutboundIPRanges: {{ include "adhoc-odoo.egressExcludeIPRanges" . | quote }}
        {{- end }}
        {{- end }}
        rollme: {{ include "adhoc-odoo.releaseDigest" . }} # Force redeploy on change
        {{- if ne .Values.adhoc.appType "prod" }}
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
        {{- end }}
      labels:
        {{- if .Values.ingress.istio.enabled }}
        istio.io/rev: {{ .Values.ingress.istio.revision | default "default" | quote }}
        {{- end }}
        {{- include "adhoc-odoo.selectorLabels" . | nindent 8 }}
        {{- include "adhoc-odoo.adhocLabels" . | nindent 8 }}
        adhoc.ar/app-name: "odoo"
    spec:
      {{- if eq .Values.storage.location "fuse" }}
      terminationGracePeriodSeconds: {{ ternary 120 60 (eq .Values.adhoc.appType "prod") }}
      {{- end }}
      serviceAccountName: {{ include "adhoc-odoo.serviceAccountName" . }}
      {{- /* La espera de PostgreSQL la maneja el entrypoint (WAIT_PG=true); ya no hay init container wait-for-postgres */}}
      {{- if .Values.adhoc.devMode }}
      initContainers:
        - name: seed-vscode-server
          image: {{ .Values.adhoc.sidecarImage | default "adhoc/ops-tools:vscode-sidecar-latest" }}
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          command:
            - /bin/bash
            - -ec
            - |
              # 1) VS Code server (precache → volumen compartido)
              mkdir -p /work/.vscode-server/bin
              for d in $ODOO_HOME/.vscode-server/bin/*; do
                name="$(basename "$d")"
                if [ ! -e "/work/.vscode-server/bin/$name" ]; then
                  cp -a "$d" "/work/.vscode-server/bin/$name"
                  echo "Copied $d to /work/.vscode-server/bin/$name"
                fi
              done
              # 2) Tooling dev (prefijo relocatable → volumen compartido). El guard
              #    hace no-op con imágenes viejas del sidecar (sin /opt/adhoc-dev).
              #    Copiamos los CONTENIDOS (dotglob para incluir .agents/) sin
              #    preservar ownership/timestamps: la raíz del emptyDir es root:root
              #    y el seed corre como odoo no-root (chown/utime en la raíz → EPERM).
              if [ -d /opt/adhoc-dev ]; then
                shopt -s dotglob
                cp -a --no-preserve=ownership,timestamps /opt/adhoc-dev/* /work/dev-tools/
                shopt -u dotglob
                echo "Seeded /opt/adhoc-dev -> /work/dev-tools ($(ls /work/dev-tools/bin 2>/dev/null | wc -l) bins)"
              fi
          volumeMounts:
            - name: vscode-server
              mountPath: /work/.vscode-server
            - name: dev-tools
              mountPath: /work/dev-tools
      {{ end }}
      priorityClassName: {{ include "adhoc-odoo.priorityClassName" (dict "ctx" . "kind" "app") }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            {{- if and (gt $minorVersion 20250806) (gt $odooVersion 150) }}
            runAsNonRoot: true
            {{- else }}
            runAsNonRoot: false
            {{- end }}
            seccompProfile:
              type: RuntimeDefault
          image: {{ $odooImage | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.adhoc.devMode }}
          args:
            - /bin/bash
            - -ec
            - |
              # devMode bootstrap: exponer al dev el tooling sembrado en /opt/adhoc-dev
              # (lo provee el initContainer seed-vscode-server desde el sidecar).
              PREFIX=/opt/adhoc-dev
              if [ -d "$PREFIX/bin" ]; then
                # Todo el setup de tooling es BEST-EFFORT: envuelto en `{ ... } || echo`
                # para que ningún fallo tumbe el pod — siempre tiene que llegar a
                # `exec sleep infinity`.
                {
                  # CLIs → ~/.local/bin: ya está en PATH en login y no-login (evita el
                  # reset de PATH de /etc/profile). Symlink al prefijo ro.
                  mkdir -p "$HOME/.local/bin"
                  for b in "$PREFIX"/bin/*; do ln -sfn "$b" "$HOME/.local/bin/$(basename "$b")"; done
                  # skills + templates → COPIAS writable en HOME. rm -rf primero: la imagen
                  # odoo ya trae ~/.claude/skills como symlinks (bake OCI) y en un restart el
                  # HOME persiste; sin el rm, cp choca ("cannot overwrite non-directory with
                  # directory") y con set -e tumbaba el pod (CrashLoop).
                  rm -rf "$HOME/.claude/skills" "$HOME/.agents/skills"
                  mkdir -p "$HOME/.claude/skills" "$HOME/.agents/skills"
                  cp -a --no-preserve=ownership,timestamps "$PREFIX"/.agents/skills/. "$HOME/.claude/skills/"
                  cp -a --no-preserve=ownership,timestamps "$PREFIX"/.agents/skills/. "$HOME/.agents/skills/"
                  for f in AGENTS.md CLAUDE.md GEMINI.md; do
                    [ -f "$PREFIX/agents-templates/$f" ] && cp -a --remove-destination "$PREFIX/agents-templates/$f" "$HOME/$f"
                  done
                  # hooks user-level (idempotente, non-interactive). La identidad queda
                  # pendiente (skeleton); el dev la completa en el primer "hola".
                  timeout 180 "$PREFIX/bin/adhoc-way" init
                } || echo "dev-tools bootstrap: warning (best-effort), el pod sigue arriba"
              fi
              exec sleep infinity
          {{ end }}
          ports:
            - name: http
              containerPort: 8069
              protocol: TCP
            - name: websocket
              containerPort: 8072
              protocol: TCP
          {{- if not .Values.adhoc.devMode }}
          # https://v1-18.docs.kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
          # Waits the pod to be ready on startup, important during modules installation or running "fixdb"
          startupProbe:
            {{- if and $isKedaEnabled (ne .Values.adhoc.appType "int") (ne .Values.adhoc.appType "old") (ne .Values.adhoc.appType "new") }}
            # healthz gates readiness to a worker that can serve a DB-backed request
            httpGet:
              {{- if ge $odooVersion 180 }}
              path: /saas_client/healthz
              {{- else }}
              path: /web/health
              {{- end }}
              port: 8069
            {{- else }}
            tcpSocket:
              port: 8069
            {{- end }}
            initialDelaySeconds: 1
            failureThreshold: 900 # 15 min
            periodSeconds: 1
          # Check if the pod is halted and need to be restarted. Bases no-fuse → tcpSocket.
          livenessProbe:
            {{- if eq .Values.storage.location "fuse" }}
            # exec, no tcpSocket: con el mount gcsfuse muerto (Errno 107) Odoo sigue escuchando en
            # 8069, así que el tcp no lo ve. os.stat del mount + check del puerto → fuerza restart.
            exec:
              command:
                - python3
                - -c
                - "import os,socket; os.stat('{{ $fusePath }}'); socket.create_connection(('127.0.0.1', 8069), 3).close()"
            {{- else }}
            tcpSocket:
              port: 8069
            {{- end }}
            initialDelaySeconds: 2
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 8 # 1 min
            successThreshold: 1
          # Check if the pod is ready to receive traffic from the service
          readinessProbe:
            # - if $isKedaEnabled
            # httpGet:
            #   # Para aprovechar el autoescalado basado en métricas de tráfico de KEDA, la sonda de readiness debe
            #   {{- if ge $odooVersion 180 }}
            #   path: /saas_client/healthz
            #   {{- else }}
            #   path: /web/health
            #   {{- end }}
            #   port: 8069
            # initialDelaySeconds: 2
            # periodSeconds: 10
            # timeoutSeconds: 10
            # failureThreshold: 3 # 30 sec
            # successThreshold: 1
            # - else
            tcpSocket:
              port: 8069
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3 # 30 sec
            successThreshold: 1
            # - end
          {{- end }}
          envFrom:
          - configMapRef:
              name: {{ include "adhoc-odoo.fullname" . }}-common-envs
          # - configMapRef:
          #     name: {{ include "adhoc-odoo.fullname" . }}-envs
          # - secretRef:
          #     name: {{ include "adhoc-odoo.fullname" . }}-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.odoo.monitoring.enabled }}
            - name: PROMETHEUS_ENABLED
              value: "1"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
          {{- if eq .Values.storage.location "fuse" }}
          {{- /* $fusePath se define al top del template (reusado por la livenessProbe) */}}
          - name: gcs-fuse-csi-ephemeral
            readOnly: false
            mountPath: {{ $fusePath }}
          - name: gcs-fuse-csi-ephemeral-skip
            readOnly: false
            mountPath: {{ printf "%s/%s" $fusePath "checklist" }}
          {{- end }}
          {{- if and .Values.ingress.reverseProxy.enabled (ge $odooVersion 180) }}
          - name: odoo-sendfile-conf
            mountPath: /home/odoo/.resources/conf.d/99-odoo-send-file.conf
            subPath: odoo-send-file.conf
            readOnly: true
          {{- end }}
          {{- if ge $odooVersion 190 }}
          - name: odoo-extra-conf
            mountPath: /home/odoo/.resources/conf.d/99-odoo-extra.conf
            subPath: odoo-extra.conf
            readOnly: true
          {{- end }}
          {{- if .Values.adhoc.devMode }}
          - name: vscode-server
            mountPath: /home/odoo/.vscode-server
            readOnly: false
          - name: dev-tools
            mountPath: /opt/adhoc-dev
            readOnly: true
          {{- end }}
          # Prevent session creations on FS (We only use redis or db_session) TA #63659
          # TODO: Only when version is lower than 16 (not including 16, because in 16 they moved the session folder to /home/odoo/data/sessions and we can mount it read-only, preventing any session to be created on FS, but in 15 and lower, the session folder is inside the odoo source code and we can't mount it read-only without breaking the app)
          - name: session-folder-ro
            mountPath: /home/odoo/data/sessions
            readOnly: true
          {{- if and .Values.odoo.monitoring.enabled .Values.odoo.monitoring.exporterSidecar }}
          # Shared with the prometheus-exporter sidecar; the module writes multiprocess metric files here.
          - name: prometheus-multiproc
            mountPath: /tmp/prometheus_client
          {{- end }}
        {{- if and .Values.odoo.monitoring.enabled .Values.odoo.monitoring.exporterSidecar }}
        # Out-of-band metrics exporter: serves /metrics from the shared multiprocess dir so scrapes
        # survive Odoo worker-pool exhaustion. Image from values (monitoring.exporterRepository/Tag);
        # source at devops-ops-tools/prometheusOdooExporter.
        - name: prometheus-exporter
          image: {{ printf "%s:%s" .Values.odoo.monitoring.exporterRepository .Values.odoo.monitoring.exporterTag | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: PROMETHEUS_MULTIPROC_DIR
              value: "/tmp/prometheus_client"
          ports:
            - name: prom-odoo
              containerPort: 9101
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: prometheus-multiproc
              mountPath: /tmp/prometheus_client
              readOnly: true
        {{- end }}
      affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              {{- /* Try not to co-locate pods for this service with other pods for this service */}}
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/instance: {{ .Release.Name }}
                      adhoc.ar/app-name: "odoo"
                  topologyKey: "kubernetes.io/hostname"
              {{- /* Try to distribute services of the same type among nodes */}}
              - weight: 50
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      adhoc.ar/tier: {{ .Values.adhoc.appType | lower }}
                  namespaceSelector:
                    matchExpressions:
                      - key: "kubernetes.io/metadata.name"
                        operator: Exists
                  topologyKey: "kubernetes.io/hostname"
              {{- /* Try to distribute the pods with the same service level among nodes */}}
              - weight: 50
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      adhoc.ar/service-level: {{ .Values.adhoc.serviceLevel }}
                  namespaceSelector:
                    matchExpressions:
                      - key: "kubernetes.io/metadata.name"
                        operator: Exists
                  topologyKey: "kubernetes.io/hostname"
              {{- if .Values.cloudNativePG.enabled }}
              {{- /* Try to distribute pg in different nodes increasing availability */}}
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      cnpg.io/cluster: {{ .Release.Name }}-pg
                  topologyKey: "kubernetes.io/hostname"
              {{- end }}
          {{- if .Values.nodeTag }}
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: {{ .Values.nodeTag }}
                  operator: In
                  values:
                  - "true"
          {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      nodeSelector:
        {{- if eq .Values.storage.location "fuse" }}
        iam.gke.io/gke-metadata-server-enabled: "true"
        {{- end }}
      {{- with .Values.nodeSelector }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      {{- if .Values.ingress.reverseProxy.enabled }}
      - name: odoo-sendfile-conf
        configMap:
          name: {{ include "adhoc-odoo.fullname" . }}-odoo-sendfile-conf
      {{- end }}
      {{- if ge $odooVersion 190 }}
      - name: odoo-extra-conf
        configMap:
          name: {{ include "adhoc-odoo.fullname" . }}-odoo-extra-conf
      {{- end }}
      {{- if eq .Values.storage.location "fuse" }}
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          readOnly: false
          volumeAttributes:
            bucketName: {{ .Values.storage.aws_bucketname | quote }}
            {{- /*
            Description: Whether your workload should export metrics. This should be set to "false" if you plan on using

            Default: true
            */}}
            disableMetrics: "true"
            {{- /*
            Directs the CSI driver to skip redundant access control checks for the Cloud Storage bucket, when set to "true".
            This reduces the overhead of redundant Kubernetes Service API, Security Token Service, and IAM calls.
            When the flag is set, the Cloud Storage FUSE process, running as part of the sidecar container in the Pod,
            handles the bucket access control checks

            Default: False
            */}}
            skipCSIBucketAccessCheck: "true"
            gcsfuseLoggingSeverity: warning
            mountOptions: "uid=1000,gid=1000,file-mode=600,dir-mode=700,implicit-dirs=true,o=rw,write:enable-streaming-writes:false,file-cache:enable-parallel-downloads:true,file-cache:parallel-downloads-per-file:4,file-cache:max-parallel-downloads:-1,file-cache:download-chunk-size-mb:3,file-cache:max-size-mb:200,metadata-cache:ttl-secs:-1"
            fileCacheCapacity: "200Mi"
      - name: gcs-fuse-csi-ephemeral-skip
        emptyDir: {}
      {{- end }}
      {{- if .Values.adhoc.devMode }}
      - name: vscode-server
        emptyDir: {}
      - name: dev-tools
        emptyDir: {}
      {{- end }}
      - name: session-folder-ro
        emptyDir: {}
      {{- if and .Values.odoo.monitoring.enabled .Values.odoo.monitoring.exporterSidecar }}
      # Volume shared with the exporter sidecar for prometheus_client multiproc files (tiny mmap files).
      - name: prometheus-multiproc
        emptyDir: {}
      {{- end }}
