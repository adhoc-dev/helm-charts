{{- $mode := include "adhoc-odoo.egressMode" . -}}
{{- if and .Values.ingress.istio.enabled (eq $mode "enforce") -}}
# Whitelist de egress (modo enforce, default-deny). Con el sidecar en REGISTRY_ONLY
# (ver sidecar.yaml), SOLO los hosts con ServiceEntry son alcanzables y el sidecar
# sale DIRECTO a ellos (Model A — sin egress gateway). Un host fuera de la lista queda
# bloqueado por REGISTRY_ONLY (deny-by-default).
#
# El egress a Internet de los pods NO inyectados (PostgreSQL/CNPG, jobs) lo bloquea la
# NetworkPolicy de egress (ver egress-networkpolicy.yaml) — esos pods no tienen sidecar
# y de otro modo saldrían directo por el NAT.
#
# allowedHosts se puebla desde el inventario de egress (modo observe, spec 0007).
{{- range $host := .Values.ingress.istio.allowedHosts }}
# ServiceEntry: declara el host externo en el registry para que REGISTRY_ONLY lo permita.
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: allow-egress-{{ $host | replace "*" "wildcard" | replace "." "-" }}
spec:
  hosts:
  - "{{ $host }}"
  location: MESH_EXTERNAL
  ports:
  - number: 443
    name: https
    protocol: HTTPS
  resolution: DNS
---
{{- end }}
{{- end }}
