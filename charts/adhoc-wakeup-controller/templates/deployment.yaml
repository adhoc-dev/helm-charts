apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adhoc-wakeup-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adhoc-wakeup-controller.labels" . | nindent 4 }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "adhoc-wakeup-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "adhoc-wakeup-controller.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "adhoc-wakeup-controller.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: WAKEUP_DOMAIN
              value: {{ .Values.domain | quote }}
            - name: WAKEUP_FINALIZER
              value: {{ .Values.finalizer | quote }}
            - name: PROMETHEUS_URL
              value: {{ .Values.prometheusUrl | quote }}
            - name: CONTROLLER_SVC
              value: {{ include "adhoc-wakeup-controller.serviceFQDN" . | quote }}
            - name: CONTROLLER_PORT
              value: {{ .Values.service.port | quote }}
            - name: IDLE_RPS_THRESHOLD
              value: {{ .Values.idleRpsThreshold | quote }}
            - name: IDLE_CONSECUTIVE_THRESHOLD
              value: {{ .Values.idleConsecutiveThreshold | quote }}
            - name: WAKEUP_TIMEOUT
              value: {{ .Values.wakeupTimeoutSeconds | quote }}
            - name: REFRESH_SECONDS
              value: {{ .Values.refreshSeconds | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
