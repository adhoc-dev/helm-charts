{{- $mode := include "adhoc-odoo.egressMode" . -}}
{{- if and .Values.ingress.istio.enabled (eq $mode "enforce") -}}
# NetworkPolicy de egress (enforce): deniega la salida directa a Internet desde TODOS los
# pods del namespace — incluido PG, que no tiene sidecar y esquivaría la malla por el NAT.
# Permite solo lo esencial de cluster + lo declarado en values; así toda salida a Internet
# pasa por el egress gateway (istio-system). Defensa en profundidad junto a REGISTRY_ONLY.
{{- $extra := (((.Values.ingress.istio.egress | default dict).networkPolicy | default dict).allow | default list) -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "adhoc-odoo.fullname" . }}-egress
  labels:
    {{- include "adhoc-odoo.labels" . | nindent 4 }}
spec:
  podSelector: {}        # todos los pods del namespace (Odoo, PG, jobs, ...)
  policyTypes:
  - Egress
  egress:
  # DNS: NodeLocal DNSCache (IP link-local en el nodo, GKE) + kube-dns (kube-system).
  # En GKE el pod resuelve vía 169.254.20.10 (node-local), NO el ClusterIP de kube-dns →
  # hay que permitir esa IP explícitamente (el namespaceSelector de kube-system no la cubre).
  # Validado en test: sin esto, enforce rompe TODA resolución DNS del namespace.
  - to:
    - ipBlock:
        cidr: 169.254.20.10/32
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Control plane + egress gateway (istio-system): toda salida a Internet sale por acá
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system
  # Intra-namespace (PG, servicios locales del release)
  - to:
    - podSelector: {}
  # Metadata server de GKE (Workload Identity / GCS FUSE)
  - to:
    - ipBlock:
        cidr: 169.254.169.254/32
  # IMPORTANTE: el API server (control plane GKE) NO es alcanzable por default y el
  # instance manager de CNPG (pod PostgreSQL) lo necesita — sin él, enforce rompe la DB.
  # Su IP es por-cluster, así que va en egress.networkPolicy.allow (ej. cluster01:
  # "172.16.16.2/32"). Obtenerla: kubectl -n default get endpoints kubernetes.
  {{- range $extra }}
  # Extra permitido (ingress.istio.egress.networkPolicy.allow)
  - to:
    - ipBlock:
        cidr: {{ . | quote }}
  {{- end }}
{{- end }}
