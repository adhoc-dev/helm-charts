# Default values for adhoc-odoo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

changeCause: "Helm Update"
replicaCount: 1

image:
  repository: adhoc/odoo-adhoc
  # repository: dockerhub.adhoc.inc/adhoc/odoo-adhoc
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "19.0"
  pullSecret: "regcred"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

service:
  type: ClusterIP
  port: 80

ingress:
  # NGINX Ingress Controller
  enabled: true
  # adhoc-letsencrypt-prod-issuer
  # adhoc-letsencrypt-staging-issuer
  issuer: adhoc-letsencrypt-prod-issuer
  # AltHost
  hosts: ""
  cloudMainDomain: adhoc.ar
  configurationSnippet:
    enabled: false
    snippet: |
      add_header Referrer-Policy "no-referrer";

  # Istio Ingress
  istio:
    enabled: false
    revision: default

    issuer: istio-http-cluster-issuer
    cloudMainDomain: shared.dev-adhoc.com
    altHosts: ""
    createCertificate: true

    # --- Egress (firewall + logging). Spec devops-project 0007 (logging) + iteración 2. ---
    # Modo de egress: open | observe | enforce.
    #   open    = ALLOW_ANY, sin logging ni bloqueo (opt-out explícito).
    #   observe = ALLOW_ANY + logging de egress con SNI (default con istio.enabled).
    #   enforce = REGISTRY_ONLY + listas + NetworkPolicy: Istio única salida, no-TLS bloqueado.
    # Vacío → lo resuelve el chart: con istio.enabled, default "observe".
    egress:
      mode: ""
      # enforce: namespaces de servicios cluster-level que Odoo usa cross-namespace.
      # Con el sidecar en REGISTRY_ONLY hay que incluirlos en su scope o se bloquean
      # (validado en cluster01: redis, aeroo y kwkhtmltopdf rompían sin esto).
      meshExternalNamespaces:
        - adhoc-redis
        - adhoc-aeroo-docs
        - kwkhtmltopdf
      networkPolicy:
        # enforce: CIDRs privados extra permitidos para los pods NO-meshed (PG, jobs),
        # además de los baked-in RFC1918 + link-local (10/8, 172.16/12, 192.168/16,
        # 169.254/16) — que ya cubren pods/services, API server GKE, NodeLocal DNS,
        # metadata server, istio-system, etc. Normalmente vacío.
        allow: []
    # Lista blanca (enforce): únicos hosts externos alcanzables. El sidecar (REGISTRY_ONLY)
    # sale DIRECTO a ellos. Se puebla desde el inventario de egress (modo observe).
    # Incluir github en instancias con addons por PR.
    allowedHosts: []
      # - "github.com"
      # - "codeload.github.com"
      # - "objects.githubusercontent.com"
    logAll: false
    # DEPRECADO: usar egress.mode. Compat: logEgress=true → observe.
    logEgress: false
    # DEPRECADO: usar egress.mode. Compat: blockOutboundTraffic=true → enforce.
    blockOutboundTraffic: false
    http10:
      enabled: false

  # Reverse proxy cache
  reverseProxy:
    enabled: false
    scale: 1
    whitelistedIps:
      # NATs Cell00 / legacy
      - 34.139.108.233/32
      # NATs Cell01
      - 34.139.101.254/32
      # NATs Cell02
      - 35.196.146.209/32
      # LB IPs Cell00 / legacy
      - 35.190.190.203/32
      # LB IPs Cell01
      - 34.24.129.8/32
      # LB IPs Cell02
      - 34.148.114.169/32
    blockedIps:
      - 103.138.125.192/32
      - 52.184.192.24/32
      - 146.59.227.21/32
      - 13.90.159.17/32
      - 40.69.220.236/32
      - 13.90.159.79/32
      - 13.90.226.73/32
      - 192.9.149.205/32
      - 201.119.29.98/32
      - 45.141.215.40/32
