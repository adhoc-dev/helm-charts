{{- /*
Validaciones de valores: este archivo se renderiza (a diferencia de _helpers.tpl),
por lo que los `fail` sí se ejecutan durante `helm template/install/upgrade`.
*/ -}}

{{- /*
No permitir a la vez Ingress NGINX y recursos Istio.
Si se habilitan ambos, cert-manager (ingress-shim) puede crear Certificates extra.
*/ -}}
{{- if and .Values.ingress.enabled .Values.ingress.istio.enabled -}}
{{- fail "You can't enable both: ingress.enabled and ingress.istio.enabled at the same time. Please enable only one." -}}
{{- end -}}

{{- /*
No permitir HPA y KEDA simultáneamente.
*/ -}}
{{- if and .Values.autoscaling.hpa.enabled .Values.autoscaling.keda.enabled -}}
{{- fail "You can't enable both: autoscaling.hpa.enabled and autoscaling.keda.enabled at the same time. Please enable only one." -}}
{{- end -}}

{{- /*
Si HPA está habilitado, minReplicas debe ser > 0.
*/ -}}
{{- if and .Values.autoscaling.hpa.enabled (not .Values.autoscaling.minReplicas) -}}
{{- fail "You must set autoscaling.minReplicas to a value higher than 0 when autoscaling.hpa.enabled is true." -}}
{{- end -}}

{{- /*
Debe existir nombre de base de datos.
*/ -}}
{{- if not .Values.odoo.pg.db -}}
{{- fail "You must set .Values.odoo.pg.db to a valid database name." -}}
{{- end -}}

{{- /*
wakeupController: keda es prerrequisito, pero no es un error tenerlo apagado.
Si keda está desactivado, el wakeup controller queda deshabilitado
automáticamente (lo resuelve el helper "wakeupController.enabled"), así que su
configuración solo se valida cuando keda está efectivamente activo.
*/ -}}
{{- if and .Values.autoscaling.wakeupController.enabled (eq (include "keda.enabled" . | trim) "true") -}}
{{- if eq (.Values.autoscaling.wakeupController.controllerSvc | default "") "" -}}
{{- fail "autoscaling.wakeupController.enabled=true requires autoscaling.wakeupController.controllerSvc to be set (use the FQDN from the adhoc-wakeup-controller chart NOTES)." -}}
{{- end -}}
{{- if ne (.Values.autoscaling.minReplicas | int) 0 -}}
{{- fail "autoscaling.wakeupController.enabled=true requires autoscaling.minReplicas=0 (scale-to-zero mode)." -}}
{{- end -}}
{{- end -}}
