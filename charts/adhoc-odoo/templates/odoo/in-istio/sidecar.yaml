{{- if .Values.ingress.istio.enabled -}}
{{- $mode := include "adhoc-odoo.egressMode" . -}}
# Usamos el Sidecar de Istio para permitir que Keda acceda a los servicios del namespace
# y también para permitir que los servicios del namespace accedan a Keda.
# Esta configuracion se hereda por los envoy de los servicio y evitamos que se traigan copia de las configuraciones de los otros servicios

apiVersion: networking.istio.io/v1
kind: Sidecar
metadata:
  name: default
spec:
#  # Selector de pods al que se aplica esta configuración
#  # No lo especificamos para que se aplique a todos los pods del namespace
#   workloadSelector:
#     labels:
#       app: my-app         # Aplicar a todos los pods con esta etiquetaz
  egress:
  - hosts:
    - "{{ .Release.Namespace }}/*"           # servicios en el mismo namespace
    - "istio-system/*"    # servicios del control plane
    {{- /* En enforce (REGISTRY_ONLY) el scope debe incluir los servicios cluster-level
       que Odoo usa cross-namespace (redis, aeroo, kwkhtmltopdf); si no, se bloquean.
       Inocuo en open/observe (ALLOW_ANY igual pasa). Validado en cluster01. */}}
    {{- range .Values.ingress.istio.egress.meshExternalNamespaces }}
    - "{{ . }}/*"
    {{- end }}

  {{- if eq $mode "enforce" }}
  # enforce: bloqueamos el tráfico de salida a internet que no esté registrado
  # (REGISTRY_ONLY). Aplica a cualquier protocolo, no solo TLS.
  outboundTrafficPolicy:
    mode: REGISTRY_ONLY
  {{- else }}
  # open / observe: permitimos el tráfico de salida a internet
  outboundTrafficPolicy:
    mode: ALLOW_ANY
  {{- end }}

{{- end }}
