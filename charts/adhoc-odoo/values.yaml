      - 13.69.197.208/32
      - 196.251.116.156/32
      - 52.164.222.60/32
      - 35.222.153.184/32
      - 34.91.246.146/32
      - 34.172.248.62/32
      - 143.105.135.78/32
      - 74.7.243.208/32
      - 74.7.242.10/32
      - 57.141.6.0/24
      - 91.224.92.99/32
      - 34.236.20.93/32
      - 4.196.109.118/32
      - 86.54.42.71/32
      - 138.2.100.145/32
      - 43.153.181.197/32
      - 51.103.226.132/32
      - 170.64.181.106/32
      - 216.244.66.234/32
      - 54.87.206.175/32
      - 142.93.229.108/32
      - 216.244.66.226/32
      - 74.7.241.40/32
      - 52.167.144.136/32
      - 52.167.144.159/32
      - 144.76.32.114/32
      - 172.192.18.188/32
      - 157.230.19.140/32
      - 74.7.241.0/24
      - 94.156.30.250/32
