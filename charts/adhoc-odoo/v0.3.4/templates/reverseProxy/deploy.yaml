{{- if .Values.ingress.reverseProxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adhoc-odoo.fullname" . }}-nx
  labels:
    {{- include "adhoc-odoo.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ .Release.Name }}-nx
  annotations:
    certmanager.k8s.io/disable-auto-restart: "true"
spec:
  {{- if and (ne .Values.ingress.reverseProxy.inactive.mode "") .Values.ingress.istio.enabled }}
  # if maintenance mode is active and we are using Istio, scale to 0 to avoid routing traffic to the app (instead of routing to a maintenance page)
  replicas: 0
  {{- else }}
  replicas: {{ .Values.ingress.reverseProxy.scale }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "adhoc-odoo.nxselectorLabels" . | nindent 8 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  revisionHistoryLimit: 2
  template:
    metadata:
      annotations:
        {{- if eq .Values.storage.location "fuse" }}
        gke-gcsfuse/volumes: "true"
        # https://cloud.google.com/kubernetes-engine/docs/how-to/persistent-volumes/cloud-storage-fuse-csi-driver?hl=es-419
        # De forma predeterminada, el contenedor del sidecar está configurado con las siguientes solicitudes de recursos, sin establecer los límites de recursos:
        # CPU de 250 m
        # 256 MiB de memoria
        # Almacenamiento efímero de 5 GiB
        gke-gcsfuse/cpu-limit: "100m"
        gke-gcsfuse/memory-limit: 512Mi
        gke-gcsfuse/ephemeral-storage-limit: 5Gi
        {{- if eq .Values.adhoc.appType "prod" }}
        gke-gcsfuse/cpu-request: 10m
        gke-gcsfuse/memory-request: 50Mi
        gke-gcsfuse/ephemeral-storage-request: 250Mi
        {{- else }}
        gke-gcsfuse/cpu-request: 5m
        gke-gcsfuse/memory-request: 25Mi
        gke-gcsfuse/ephemeral-storage-request: 100Mi
        {{- end }}
        {{- end }}
      labels:
        {{- if .Values.ingress.istio.enabled }}
        istio.io/rev: {{ .Values.ingress.istio.revision | default "default" | quote }}
        {{- end }}
        {{- include "adhoc-odoo.nxselectorLabels" . | nindent 8 }}
        {{- include "adhoc-odoo.adhocLabels" . | nindent 8 }}
        adhoc.ar/app-name: "nginx"
    spec:
      # Required so the sidecar can send HUP to nginx.
      shareProcessNamespace: true

      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch

      {{- if eq .Values.adhoc.appType "prod" }}
      priorityClassName: prod-priority
      {{- end }}
      serviceAccountName: {{ include "adhoc-odoo.serviceAccountName" . }}
      containers:
        - name: nginx
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          image: {{ printf "%s:%s" .Values.ingress.reverseProxy.image.repository .Values.ingress.reverseProxy.image.tag | quote }}
          # Wait until sidecar renders and validates config into the shared volume.
          command: ["/opt/oep/scripts/oep-nginx-start.sh"]
          ports:
            - name: http
              containerPort: 9080
              protocol: TCP
          {{- if eq .Values.adhoc.appType "prod" }}
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              cpu: 300m
              memory: 515Mi
          {{- end }}
          volumeMounts:
            {{- if eq .Values.storage.location "fuse" }}
            - name: gcs-fuse-csi-ephemeral
              {{- if .Values.cloudNativePG.enabled }}
              mountPath: /mnt/filestore/odoo
              {{- else }}
              mountPath: /mnt/filestore/{{ .Release.Name }}
              {{- end }}
              readOnly: true
            {{- end }}
            - name: nginx-logs
              mountPath: /var/log/nginx
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-etc
              mountPath: /etc/nginx
              readOnly: true
        - name: sidecar
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          image: {{ printf "%s:%s" .Values.ingress.reverseProxy.image.repository .Values.ingress.reverseProxy.image.tag | quote }}
          command: ["/opt/oep/scripts/oep-config-sidecar.sh"]
          volumeMounts:
            - name: oep-config
              mountPath: /config
              readOnly: true
            - name: nginx-etc
              mountPath: /etc/nginx
            - name: nginx-logs
              mountPath: /var/log/nginx
            - name: nginx-cache
              mountPath: /var/cache/nginx
        {{- if .Values.ingress.reverseProxy.monitoring.enabled }}
        - name: nginx-exporter
          image: {{ printf "%s:%s" .Values.ingress.reverseProxy.monitoring.exporterRepository .Values.ingress.reverseProxy.monitoring.exporterTag | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - -nginx.scrape-uri=http://127.0.0.1:8080/nginx_status
          ports:
            - name: prom-nx
              containerPort: 9113
        - name: log-exporter
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          image: {{ printf "%s:%s" .Values.ingress.reverseProxy.monitoring.logRepository .Values.ingress.reverseProxy.monitoring.logTag | quote }}
          args:
            - -format=$status
            - -listen-port=9114
            - /var/log/nginx/metrics.log
          ports:
            - name: prom-nx-log
              containerPort: 9114
          volumeMounts:
            - name: nginx-logs
              mountPath: /var/log/nginx
              readOnly: true
        {{- end }}
      volumes:
        # Only file log used by this image is /var/log/nginx/metrics.log (monitoring mode).
        - name: nginx-logs
          emptyDir: {}
        # Shared nginx config (rendered by sidecar, consumed by nginx).
        - name: nginx-etc
          emptyDir: {}
        # ConfigMap-mounted configuration that triggers reloads when updated.
        - name: oep-config
          configMap:
            name: {{ include "adhoc-odoo.fullname" . }}-oep-config
        - name: nginx-cache
          emptyDir: {}
        {{- if eq .Values.storage.location "fuse" }}
        - name: gcs-fuse-csi-ephemeral
          csi:
            driver: gcsfuse.csi.storage.gke.io
            readOnly: false
            volumeAttributes:
              bucketName: {{ .Values.storage.aws_bucketname | quote }}
              {{- /*
              Description: Whether your workload should export metrics. This should be set to "false" if you plan on using

              Default: true
              */}}
              disableMetrics: "true"
              {{- /*
              Directs the CSI driver to skip redundant access control checks for the Cloud Storage bucket, when set to "true".
              This reduces the overhead of redundant Kubernetes Service API, Security Token Service, and IAM calls.
              When the flag is set, the Cloud Storage FUSE process, running as part of the sidecar container in the Pod,
              handles the bucket access control checks

              Default: False
              */}}
              skipCSIBucketAccessCheck: "true"
              gcsfuseLoggingSeverity: warning
              mountOptions: "uid=101,gid=101,file-mode=600,dir-mode=700,implicit-dirs=true,o=r,file-cache:enable-parallel-downloads:true,file-cache:parallel-downloads-per-file:4,file-cache:max-parallel-downloads:-1,file-cache:download-chunk-size-mb:3,file-cache:max-size-mb:200,metadata-cache:ttl-secs:-1"
              fileCacheCapacity: "200Mi"
        {{- end }}
      affinity:
        {{- if .Values.nodeTag }}
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.nodeTag }}
                operator: In
                values:
                - "true"
        {{- end }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: adhoc.ar/app-name
                      operator: In
                      values:
                        - nginx
                namespaceSelector:
                  matchExpressions:
                    - key: "kubernetes.io/metadata.name"
                      operator: Exists
                topologyKey: kubernetes.io/hostname
      nodeSelector:
        {{- if eq .Values.storage.location "fuse" }}
        iam.gke.io/gke-metadata-server-enabled: "true"
        {{- end }}
{{- end }}
