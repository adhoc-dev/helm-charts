    blockedCountries:
      - "CN"
      - "IR"
      - "CU"
      - "SY"
      - "XC"
      - "XD"
      - "CN"
      - "BD"
      - "IN"
      - "UA"
      - "AE"
      - "AF"
      - "AZ"
      - "PL"
      - "ID"
      - "KH"
      - "VN"
      - "PH"
      - "SG"
      - "FR"
      - "NL"
      - "JP"
      - "SC"
      - "SA"
      - "KP"
    botBlock:
      enabled: true
      blockedUserAgents:
        # AI / LLM training crawlers
        - GPTBot
        - ChatGPT-User
        - OAI-SearchBot
        - CCBot
        - anthropic-ai
        - ClaudeBot
        - Claude
        - Google-Extended
        - PerplexityBot
        - Applebot-Extended
        - Meta-ExternalAgent
        - FacebookBot
        - cohere-ai
        - Diffbot
        - YouBot
        - Amazonbot
        - Timpibot
        - img2dataset
        # AI search / otros LLMs
        - Bytespider
        - PetalBot
        - Thinkbot
        # SEO crawlers agresivos
        - AhrefsBot
        - SemrushBot
        - DotBot
        - MJ12bot
        - BLEXBot
        - DataForSeoBot
        - serpstatbot
        - SEOkicks
        - rogerbot
        - Barkrowler
        # Motores con comportamiento agresivo o bloqueados por política
        - bingbot
        - msnbot
        - adidxbot
        - Baiduspider
        - YandexBot
        - Exabot
        # Scrapers / otros
        - MegaIndex
        - linkdexbot
    rateLimit:
      enabled: false
      static: 1000r/m
      access: 5r/m
      generic: 1000r/m
      rpc: 60r/m
      debugHeaders: false
    imageCacheEnabled: false
    image:
      # repository: nginx
      repository: dockerhub.adhoc.inc/adhoc/ops-tools
      tag: "odooEdgeProxy-2026.06.05.13"
    loadBalancerCIDR: 10.0.0.0/8
    internalClusterCIDR: 10.0.0.0/8
    # Monitoring
    monitoring:
      enabled: false
      exporterRepository: dockerhub.adhoc.inc/nginx/nginx-prometheus-exporter
      exporterTag: "1.5.1"
      # ghcr.io/martin-helmich/prometheus-nginxlog-exporter/exporter
      logRepository: dockerhub.adhoc.inc/adhoc/ops-tools
      logTag: "prometheus-nginxlog-exporter-20251216"
    inactive:
      mode: "" # empty for no action
      eta: 0 # unix timestamp

resources:
  limits:
    cpu: 3000m
    memory: 4096Mi
  requests:
    cpu: 30m
    memory: 250Mi

autoscaling:
  # Common values for HPA and KEDA
  minReplicas: 1
  maxReplicas: 10

  # HPA
  hpa:
    enabled: false
    # Target CPU Utilization Percentage
    targetCPUUtilizationPercentage: 80
    # Target Memory Utilization Percentage
    targetMemoryUtilizationPercentage: 90
  # KEDA
  keda:
    enabled: false
    rpsThreshold: 2

  # Wakeup controller (requiere autoscaling.keda.enabled=true y minReplicas=0)
  # Reemplaza el HTTP interceptor de KEDA con un servidor de espera propio.
  wakeupController:
    enabled: false
    # FQDN del servicio del controlador (salida del chart adhoc-wakeup-controller).
    # Ejemplo: adhoc-wakeup-controller.platform.svc
    controllerSvc: "adhoc-wakeup-controller.platform.svc"
    controllerPort: 9080
    # CRD group / managed-label prefix del controller al que se engancha esta
    # instancia. Default = el controller "stable". Para shadow-testear un build
    # nuevo de OWC, apuntá la instancia a un controller "canary" seteando esto al
    # mismo dominio del install canary (ej. "wakeup-canary.adhoc.inc") y
    # controllerSvc al Service del canary. Ver OWC doc/canary-testing.md.
    domain: "wakeup.adhoc.inc"
    # Opt-in: hibernar el cluster CNPG asociado cuando la instancia duerme.
    # Solo aplica si cloudNativePG.enabled=true. Ahorra el pod de PostgreSQL
    # mientras la base está dormida, a costa de un wakeup más lento (resume de
    # PostgreSQL antes de levantar Odoo).
    hibernateCnpg: false

nodeSelector: {}
tolerations: {}

odoo:
  # Database parameters
  pg:
    user: ""
    pass: ""
    host: "adhoc-pg.adhoc-pg"
    port: 5432
    db: "adhoc-pg"
  # Base Config
  basic:
    adminPass: "admin"
    dbFilter: ""
    wideModules: "base,web,server_mode,saas_client"
    logLevel: "info"
    aerooHost: ""
    emailFrom: "notifications@adhoc.nubeadhoc.com"
    withoutDemo: true
    language: "es_419"
  # Performance Config
  saas:
    mode: false
    autoinstallEnabled: "server_mode"
    autoinstallDisabled: "snailmail,account_edi_facturx"
    installDisabled: "l10n_es"
  performance:
    workers: 0
    maxCronTh: 1
    maxDbConn: 96
    dbTemplate: "template0"
    maxMemHard: "4777721600"
    maxMemSoft: "3147484000"
    maxTimeCpu: 3000
    maxTimeReal: 1600
    maxTimeCron: 6000
    maxHttpTh: 8
  entrypoint:
    # fixdb corre siempre como Job standalone (saas_k8s), nunca por el entrypoint.
    # FIXDBS / FIXDBS_ADHOC quedan apagados de forma permanente en odooEnvs.yaml.
    # Dynamic Entrypoint
    repos: ""
    custom: ""
    # Token del bot CICD; se inyecta como GITHUB_BOT_TOKEN solo si `repos` no está vacío.
    githubBotToken: ""
  # SMTP Config
  smtp:
    host: ""
    port: 0
    ssl: false
    user: ""
    pass: ""
    catchall: ""
    whiteList: "adhoc.nubeadhoc.com"
  extraEnvVars:
    # example: "yes"
    # example2: "no"
  monitoring:
    enabled: false

  kwkhtmltopdfServerUrl: "http://kwkhtmltopdf.kwkhtmltopdf"

# Redis Config
redis:
  enabled: false
  host: ""
  pass: ""
  port: 6379

# Storage
storage:
  location: "attachment_s3"
  aws_region: "US-EAST1"
  aws_host: "https://storage.googleapis.com"
  aws_bucketname: "acp-us-east1-test"
  aws_access_key_id: "keyId"
  aws_secret_access_key: "secret"

nodeTag: "Prod"

createPullSecret:
  enabled: false
  user: ""
  pass: ""
  registry: "https://index.docker.io/v2/"

adhoc:
  # standard, advanced, premium
  serviceLevel: standard
  # Type: test, train, backup, new, old
  appType: prod
  clientAnalyticAccount: "Unknown"
  devMode: false
  # (adhoc.dnsBannedHost eliminado junto con su ConfigMap /etc/hosts y el mount del
  # Deployment. En modo enforce el egress queda controlado por el whitelist deny-by-default
  # — ya no hay sinkhole por /etc/hosts. Blacklist explícito: follow-up por EnvoyFilter.)

cloudNativePG:
  checkCRD: false
  enabled: false
  version: "15.0"
  # Declarative CNPG hibernation. "off" keeps the cluster running; "on"
  # shuts down the PostgreSQL pods while keeping the PVCs. The SaaS provider
  # sets this to "on" when a database is inactivated (see saas_k8s
  # _k8s_inactivate) and back to "off" on reactivation. See cnpg/pgcluster.yaml.
  hibernation: "off"
  superUserPassword: Rgd20sGT5JKUheTbRM5VWW4sDSLHJjzh6P3JwAqtRrsnURCKzPbX4FNJ5fGWwgh8
  resources:
    requests:
      cpu: 20m
      memory: 200Mi
    limits:
      cpu: 1000m
      memory: 5000Mi
  instances: 1
  persistence:
    size: 10
    separateWAL: false
    # options are:
    # - gcp-ssd-r (to create as retain )
    # - gcp-ssd-d (to create as Delate )
    # - null (to let undefined)
    # We don't want to keep records if we no longer need them.
    storageClass: gpc-ssd-d
  libraries:
    pgaudit: false
    autoExplain: false
  parameters:
    # shared_buffers: "1GB"
    # archive_mode = 'on'
    # dynamic_shared_memory_type = 'posix'
    # full_page_writes = 'on'
    # logging_collector = 'on'
    # log_destination = 'csvlog'
    # log_directory = '/controller/log'
    # log_filename = 'postgres'
    # log_rotation_age = '0'
    # log_rotation_size = '0'
    # log_truncate_on_rotation = 'false'
    # max_parallel_workers = '32'
    # max_replication_slots = '32'
    # max_worker_processes = '32'
    # shared_memory_type = 'mmap' # for PostgreSQL >= 12 only
    # wal_keep_size = '512MB' # for PostgreSQL >= 13 only
    # wal_keep_segments = '32' # for PostgreSQL <= 12 only
    # wal_level = 'logical'
    # wal_log_hints = 'on'
    # wal_sender_timeout = '5s'
    # wal_receiver_timeout = '5s'

  backup:
    # schedule: "0 0 0 * * *" # Daily at UTC midnight
    volumeSnapshot:
      enabled: true
      # We want to keep the snapshots as backups.
      volumeSnapshotClass: gcp-r # gcp
    barman:
      enabled: false
      # S3 compatible storage configuration
      s3Endpoint: "https://storage.googleapis.com"
      s3BucketName: "acp-us-east1-test"
      s3Region: "US-EAST1"
      s3AccessKeyId: "keyId"
      s3SecretAccessKey: "secret"
      # Backup retention in days
      retentionDays: 7
  restore:
    # From cnpg volume snapshot backup
    fromSnapshot: ""
    # From the GCP snapshot path of the cnpg volume snapshot backup
    fromGCPSnapshot: null
    # We want to keep the snapshots as backups.
    volumeSnapshotClass: gcp-r # gcp
    # Not implemented
    fromDump: ""
    inTimeRecovery: null # null for no recovery, latest for or timestamp (in the RFC3339 standard)

  topologySpreadConstraints:
    enabled: false

  services:
    # If you want to disable the RO service, set this to true
    disableReadOnly: false
    externalService:
      enabled: false
      loadBalancerIP: ""
      sourceRanges: []
      password: "odoo-readonly-password"

  monitoring:
    enabled: false

resourceQuota:
  enabled: false
  requests:
    cpu: "4"
    memory: "8Gi"
    storage: "500Gi"
    ephemeral: "100Gi"
  limits:
    cpu: "4"
    memory: "8Gi"
    ephemeral: "100Gi"

limitRange:
  enabled: false
  default:
    cpu: "500m"
    memory: "512Mi"
  defaultRequest:
    cpu: "100m"
    memory: "256Mi"
  max:
    cpu: "2000m"
    memory: "4096Mi"
  min:
    cpu: "20m"
    memory: "20Mi"
