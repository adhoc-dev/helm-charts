{{- $mode := include "adhoc-odoo.egressMode" . -}}
{{- if and .Values.ingress.istio.enabled (eq $mode "enforce") -}}
# NetworkPolicy de egress (enforce): aplica a los pods NO inyectados (sin sidecar) —
# PostgreSQL/CNPG, jobs. Esos pods de otro modo salen directo por el NAT, esquivando el
# control de egress. Permite solo destinos privados/in-cluster (RFC1918 + link-local) y
# DENIEGA el resto (Internet directo). Los pods inyectados (Odoo) NO se seleccionan: su
# egress lo controla el sidecar (REGISTRY_ONLY + allowedHosts, sale directo a los permitidos).
#
# RFC1918 + link-local cubre de una: pods/services (10/8), API server GKE (172.16/12),
# NodeLocal DNS + metadata server (169.254/16), istio-system, redis/aeroo/kwk, etc.
# Validado en cluster01 (CNPG sano bajo la policy, sin Internet directo).
{{- $extra := (((.Values.ingress.istio.egress | default dict).networkPolicy | default dict).allow | default list) -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "adhoc-odoo.fullname" . }}-egress
  labels:
    {{- include "adhoc-odoo.labels" . | nindent 4 }}
spec:
  # Solo pods SIN sidecar Istio (el label security.istio.io/tlsMode lo agrega el inyector
  # a los pods meshed). Los meshed (Odoo) quedan a cargo del sidecar.
  podSelector:
    matchExpressions:
    - key: security.istio.io/tlsMode
      operator: DoesNotExist
  policyTypes:
  - Egress
  egress:
  - to:
    # Privado / in-cluster / infra (todo lo no-público). El resto (Internet) queda denegado.
    - ipBlock:
        cidr: 10.0.0.0/8
    - ipBlock:
        cidr: 172.16.0.0/12
    - ipBlock:
        cidr: 192.168.0.0/16
    - ipBlock:
        cidr: 169.254.0.0/16
    {{- range $extra }}
    - ipBlock:
        cidr: {{ . | quote }}
    {{- end }}
{{- end }}
